<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么 - 精神状态阶梯抽卡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 启动页 -->
    <div id="start-page" class="page active">
        <div class="container">
            <h1>今天吃什么</h1>
            <p class="subtitle">人类决策力退化辅助工具</p>
            <button id="start-btn" class="start-btn">开始抽卡</button>
        </div>
    </div>
    
    <!-- 抽卡页面 -->
    <div id="draw-page" class="page">
        <div class="container">
            <h1 id="step-title">今日干饭运势</h1>
            <p id="step-subtitle" class="subtitle">点击按钮，开启今日干饭指引</p>
            
            <div class="card-viewport">
                <div class="card-track" id="card-track">
                    <!-- 第一张卡片：运势 -->
                    <div id="card-1" class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-content">
                                    <div class="card-icon">🔮</div>
                                    <h2>今日运势</h2>
                                    <p>点击开启干饭指引</p>
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-content">
                                    <div class="card-icon luck-icon">🍀</div>
                                    <h2 class="luck-name">运势名称</h2>
                                    <p class="luck-desc">运势描述</p>
                                    <div class="rarity-badge"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 第二张卡片：风格 -->
                    <div id="card-2" class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-content">
                                    <div class="card-icon">🍳</div>
                                    <h2>菜系风格</h2>
                                    <p>探寻今日口味</p>
                                </div>
                            </div>
                            <div class="card-back step-2">
                                <div class="card-content">
                                    <div class="card-icon style-icon">🍲</div>
                                    <h2 class="style-name">风格名称</h2>
                                    <p class="style-desc">风格描述</p>
                                    <div class="rarity-badge"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 第三张卡片：食物 -->
                    <div id="card-3" class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-content">
                                    <div class="card-icon">🍱</div>
                                    <h2>最终菜品</h2>
                                    <p>揭晓今日伙食</p>
                                </div>
                            </div>
                            <div class="card-back step-3">
                                <div class="card-content">
                                    <div class="card-icon food-icon">🍕</div>
                                    <h2 class="food-name">菜品名称</h2>
                                    <p class="food-desc">菜品描述</p>
                                    <div class="rarity-badge food-rarity"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button id="draw-btn" class="draw-btn">开启今日干饭指引</button>
            
            <div class="progress-container">
                <div class="progress-steps">
                    <div id="step-1" class="progress-step">1</div>
                    <div id="step-2" class="progress-step">2</div>
                    <div id="step-3" class="progress-step">3</div>
                </div>
            </div>
            
            <!-- 结果显示容器 -->
            <div id="result-container" class="result-container" style="display: none;">
                <h2>今日干饭结果</h2>
                <div class="result-item">
                    <span class="result-label">运势：</span>
                    <span id="result-luck-display" class="result-value"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">风格：</span>
                    <span id="result-style-display" class="result-value"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">菜品：</span>
                    <span id="result-food-display" class="result-value"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">精神状态适配度：</span>
                    <span id="result-percentage-display" class="result-value"></span>%
                </div>
                <button id="new-draw-btn" class="new-draw-btn">再来一次</button>
            </div>
        </div>
    </div>
    
    <!-- 分享页 -->
    <div id="share-page" class="page">
        <div class="container">
            <h1>今日伙食已确定</h1>
            <div class="result-cards">
                <div class="result-card">
                    <h3>今日干饭运势</h3>
                    <div class="result-content">
                        <span id="result-luck-icon" class="result-icon">🍀</span>
                        <span id="result-luck-name" class="result-name">运势名称</span>
                    </div>
                </div>
                <div class="result-card">
                    <h3>今日菜系风格</h3>
                    <div class="result-content">
                        <span id="result-style-icon" class="result-icon">🍲</span>
                        <span id="result-style-name" class="result-name">菜系名称</span>
                    </div>
                </div>
                <div class="result-card">
                    <h3>最终菜品</h3>
                    <div class="result-content">
                        <span id="result-food-icon" class="result-icon">🍕</span>
                        <span id="result-food-name" class="result-name">菜品名称</span>
                        <span id="result-rarity" class="rarity-badge">普通</span>
                    </div>
                </div>
            </div>
            
            <div class="status-container">
                <p>今日干饭运势：<span id="status-percentage">100</span>%</p>
            </div>
            
            <div class="share-container">
                <p class="share-text">我的今日伙食是<span id="share-food">菜品名称</span>，精神状态已暴露。</p>
                <p class="tag">#今天吃什么 #人类决策力退化辅助工具</p>
                <button id="restart-btn" class="restart-btn">再来一次</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
